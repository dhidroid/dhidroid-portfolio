name: 🗺️ Daily Sitemap Generator

on:
  schedule:
    - cron: '0 0 * * *'  # runs every day at midnight UTC
  workflow_dispatch:

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Debug token
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ TOKEN is EMPTY — secret not found"
            exit 1
          else
            echo "✅ TOKEN is loaded (masked)"
          fi
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --force || npm ci

      - name: Generate sitemap
        run: node sitemap.js

      - name: Commit and push sitemap
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}   # FIXED indent
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add public/sitemap.xml
          git commit -m "🤖 Update sitemap [skip ci]" || echo "No changes to commit"

          # Use PAT for authentication
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git

          # Push to the current branch (auto-detect)
          git push origin HEAD:${{ github.ref_name }}
