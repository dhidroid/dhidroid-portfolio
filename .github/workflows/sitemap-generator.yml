name: 🗺️ Daily Sitemap Generator

on:
  schedule:
    - cron: '0 0 * * *'  # runs every day at midnight UTC
  workflow_dispatch:      # allows manual run too

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: | 
          npm install --force || npm ci

      - name: Generate sitemap
        run: node sitemap.js

      - name: Commit and push sitemap
        env:
         TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git config --global user.name "dhidroid"
          git config --global user.email "dhinesh4668@outlook.com"
          git add public/sitemap.xml
          git commit -m "🤖 Update sitemap [skip ci]" || echo "No changes to commit"
          git push
