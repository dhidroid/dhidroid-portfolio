name: Daily Sitemap Generator

on:
  schedule:
    - cron: '0 0 * * *'  # runs every day at midnight UTC
  workflow_dispatch:

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}  # Use PAT for checkout
          fetch-depth: 0
          
      - name: Debug token
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ TOKEN is EMPTY — secret not found"
            exit 1
          else
            echo "✅ TOKEN is loaded (masked)"
          fi
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm install --force || npm ci
          
      - name: Generate sitemap
        run: node sitemap.js
        
      - name: Commit and push sitemap
        env:
          TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          git config user.name "dhidroid"
          git config user.email "dhidroid@users.noreply.github.com"
          
          # Check if there are changes
          if git diff --quiet public/sitemap.xml; then
            echo "No changes to sitemap"
            exit 0
          fi
          
          git add public/sitemap.xml
          git commit -m "🤖 Update sitemap [skip ci]"
          
          # Push using PAT
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
