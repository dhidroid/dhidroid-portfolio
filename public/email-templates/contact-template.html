<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>New Contact Message</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#f7f7f8; margin:0; padding:32px; }
      .card { max-width:720px; margin:0 auto; background:#ffffff; border-radius:6px; padding:32px; box-shadow:0 10px 30px rgba(2,6,23,0.06); }
      h1 { font-size:36px; margin:0 0 8px; line-height:1; font-weight:800; letter-spacing:-0.02em; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
      p { margin:8px 0; color:#334155; }
      .meta { font-size:13px; color:#64748b; margin-top:12px; }
      .label { font-weight:700; color:#0f172a; display:inline-block; width:110px; text-transform:uppercase; font-size:12px; letter-spacing:0.18em }
      pre { white-space:pre-wrap; word-wrap:break-word; background:#fbfbfd; padding:14px; border-radius:8px; border:1px solid #eef2ff; color:#0f172a }
      .primary { color:#0ea5a0 }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>New message: <span class="primary">{{title}}</span></h1>

      <p><span class="label">From:</span> <strong>{{name}}</strong> &lt;{{email}}&gt;</p>
      <p><span class="label">Subject:</span> {{subject}}</p>

      <h2 style="font-size:13px;margin-top:18px;margin-bottom:8px;color:#0f172a;letter-spacing:0.06em;text-transform:uppercase">Message</h2>
      <pre>{{message}}</pre>

      <p class="meta">Received: {{time}}</p>

      <hr style="margin:18px 0;border:none;border-top:1px solid #eef2ff" />
      <p style="font-size:12px;color:#94a3b8;margin:0">This message was sent using EmailJS from your website.</p>
    </div>
  </body>
</html>
